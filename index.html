<!DOCTYPE html>
<html>
<head>
  <title>Login - Tamdeen Fire Safety</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="fire-bg">

<div class="login-box">
  <h2>🔥 Tamdeen Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <p id="error"></p>

  <hr>

  <h4>Change Credentials</h4>
  <input type="text" id="oldUser" placeholder="Old Username">
  <input type="password" id="oldPass" placeholder="Old Password">
  <input type="text" id="newUser" placeholder="New Username">
  <input type="password" id="newPass" placeholder="New Password">

  <button onclick="changeCredentials()">Update</button>
</div>

<script src="js/auth.js"></script>
</body>
</html>
